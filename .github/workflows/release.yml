name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, docker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build Next.js
        run: npm run build

      - name: Package .next/
        run: |
          TAG="${GITHUB_REF_NAME}"
          tar -czf "nexdmarc-next-${TAG}.tar.gz" .next
          ls -lh "nexdmarc-next-${TAG}.tar.gz"

      - name: Compute SHA256
        run: |
          TAG="${GITHUB_REF_NAME}"
          sha256sum "nexdmarc-next-${TAG}.tar.gz" > "nexdmarc-checksums-${TAG}.txt"
          cat "nexdmarc-checksums-${TAG}.txt"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexdmarc-next-*.tar.gz
            nexdmarc-checksums-*.txt
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
