name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  audit:
    name: npm Audit
    runs-on: [self-hosted, Linux, X64, docker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci --no-audit --no-fund

      - run: npm audit --audit-level=high
        continue-on-error: true
